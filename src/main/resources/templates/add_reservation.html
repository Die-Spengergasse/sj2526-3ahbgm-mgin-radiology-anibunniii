<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/html">
<head>
  <meta charset="UTF-8">
  <title>Add Reservation</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
  <a href="/" class="navbar-brand">🌸 Radiology</a>
  <ul class="navbar-links">
    <li><a href="/">Home</a></li>
    <li><a href="/patient/list">Patients</a></li>
    <li><a href="/modality/list" >Modalities</a></li>
    <li><a href="/reservation/list" class="active">Reservations</a></li>
  </ul>
</nav>

<div class="page">
  <p class="page-subtitle"><a href="/reservation/list" style="color: var(--text-light); text-decoration: none;">← Back to reservations</a></p>
  <h1 class="page-title">New Reservation</h1>
  <p class="page-subtitle">Schedule an imaging appointment</p>

  <div class="card">
    <form th:action="@{/reservation/add}" th:object="${reservation}" method="post">

      <div class="form-group">
        <label>Patient</label>
        <select th:field="*{patient}" class="form-control">
          <option value="">— Select patient —</option>
          <option th:each="p : ${patients}" th:value="${p.id}" th:text="${p.firstname + ' ' + p.lastname}"></option>
        </select>
      </div>

      <div class="form-group">
        <label>Modality</label>
        <select th:field="*{modality}" class="form-control">
          <option value="">— Select modality —</option>
          <option th:each="m : ${modalities}" th:value="${m.id}" th:text="${m.type + ' — Room ' + m.roomnr}"></option>
        </select>
      </div>

      <div class="form-group">
        <label>Reservation Time</label>
        <input type="datetime-local" th:field="*{reservationTime}" class="form-control">
      </div>

      <div class="form-group">
        <label>Body Region</label>
        <select th:field="*{bodyRegion}" class="form-control">
          <option value="">— Select region —</option>
          <option value="Head">Head</option>
          <option value="Chest">Chest</option>
          <option value="Abdomen">Abdomen</option>
          <option value="Pelvis">Pelvis</option>
          <option value="Spine">Spine</option>
          <option value="Extremities">Extremities</option>
        </select>
      </div>

      <div class="form-group">
        <label>Comment</label>
        <textarea th:field="*{comment}" class="form-control" rows="3" placeholder="Optional notes..."></textarea>
      </div>

      <input type="submit" class="btn btn-primary" value="Save Reservation">
    </form>
  </div>
</div>

</body>
</html>
