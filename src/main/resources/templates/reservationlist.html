<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/html">
<head>
  <meta charset="UTF-8">
  <title>Reservation List</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
  <a href="/" class="navbar-brand">🌸 Radiology</a>
  <ul class="navbar-links">
    <li><a href="/">Home</a></li>
    <li><a href="/patient/list">Patients</a></li>
    <li><a href="/modality/list">Modalities</a></li>
    <li><a href="/reservation/list" class="active">Reservations</a></li>
  </ul>
</nav>

<div class="page">
  <div class="table-header">
    <div>
      <h1 class="page-title">Reservations</h1>
      <p class="page-subtitle">All scheduled imaging appointments</p>
    </div>
    <a href="/reservation/add" class="btn btn-primary">+ Add Reservation</a>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
      <tr>
        <th>Patient</th>
        <th>Modality</th>
        <th>Time</th>
        <th>Body Region</th>
        <th>Comment</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="r : ${reservations}">
        <td th:text="${r.patient.firstname + ' ' + r.patient.lastname}"></td>
        <td><span class="badge badge-matcha" th:text="${r.modality.type}"></span></td>
        <td th:text="${r.reservationTime}"></td>
        <td><span class="badge badge-pink" th:text="${r.bodyRegion}"></span></td>
        <td th:text="${r.comment}"></td>
      </tr>
      </tbody>
    </table>
  </div>
</div>

</body>
</html>
