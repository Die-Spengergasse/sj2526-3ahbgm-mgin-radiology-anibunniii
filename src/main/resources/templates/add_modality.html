<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>Add Modality</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <a href="/" class="navbar-brand">🌸 Radiology</a>
    <ul class="navbar-links">
        <li><a href="/">Home</a></li>
        <li><a href="/patient/list">Patients</a></li>
        <li><a href="/modality/list" class="active">Modalities</a></li>
        <li><a href="/reservation/list">Reservations</a></li>
    </ul>
</nav>

<div class="page">
    <p class="page-subtitle"><a href="/modality/list" style="color: var(--text-light); text-decoration: none;">← Back to modalities</a></p>
    <h1 class="page-title">New Modality</h1>
    <p class="page-subtitle">Add an imaging device to the system</p>

    <div class="card">
        <form th:action="@{/modality/add}" th:object="${modality}" method="post">

            <div class="form-group">
                <label>Type</label>
                <select th:field="*{type}" class="form-control">
                    <option value="MRI">MRI</option>
                    <option value="CT">CT</option>
                    <option value="X-Ray">X-Ray</option>
                    <option value="Ultrasound">Ultrasound</option>
                    <option value="PET">PET</option>
                </select>
            </div>

            <div class="form-group">
                <label>Room Nr</label>
                <input type="number" th:field="*{roomnr}" class="form-control" placeholder="e.g. 101">
            </div>

            <input type="submit" class="btn btn-primary" value="Save Modality">
        </form>
    </div>
</div>

</body>
</html>
