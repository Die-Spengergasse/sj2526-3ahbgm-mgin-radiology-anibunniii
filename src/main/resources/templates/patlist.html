<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>Patient List</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <a href="/" class="navbar-brand">🌸 Radiology</a>
    <ul class="navbar-links">
        <li><a href="/">Home</a></li>
        <li><a href="/patient/list" class="active">Patients</a></li>
        <li><a href="/modality/list">Modalities</a></li>
        <li><a href="/reservation/list">Reservations</a></li>
    </ul>
</nav>

<div class="page">
    <div class="table-header">
        <div>
            <h1 class="page-title">Patients</h1>
            <p class="page-subtitle">All registered patients</p>
        </div>
        <a href="/patient/add" class="btn btn-primary">+ Add Patient</a>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
            <tr>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Birth Date</th>
                <th>SSN</th>
                <th>Gender</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${patients}">
                <td th:text="${p.firstname}"></td>
                <td th:text="${p.lastname}"></td>
                <td th:text="${p.birth}"></td>
                <td th:text="${p.ssn}"></td>
                <td><span class="badge badge-pink" th:text="${p.gender}"></span></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
